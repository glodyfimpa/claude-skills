<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #1a1a1a;
    }
    .stats {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .stat-value {
      font-weight: 600;
      color: #2196F3;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .btn-primary {
      background: #2196F3;
      color: white;
    }
    .btn-primary:hover { background: #1976D2; }
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    .btn-secondary:hover { background: #bdbdbd; }
    .btn-danger {
      background: #fff;
      color: #f44336;
      border: 1px solid #f44336;
    }
    .btn-danger:hover { background: #ffebee; }
    .status {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: #666;
    }
    .instructions {
      font-size: 11px;
      color: #888;
      line-height: 1.4;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h2>Property Scanner</h2>

  <div class="stats">
    <div class="stat-row">
      <span>Annunci trovati:</span>
      <span class="stat-value" id="searchCount">0</span>
    </div>
    <div class="stat-row">
      <span>Dettagli estratti:</span>
      <span class="stat-value" id="detailCount">0</span>
    </div>
  </div>

  <button class="btn-primary" id="exportBtn">Esporta al backend</button>
  <button class="btn-secondary" id="downloadBtn">Scarica JSON</button>
  <button class="btn-danger" id="clearBtn">Cancella dati</button>

  <div class="status" id="status"></div>

  <div class="instructions">
    Naviga su Idealista normalmente. L'estensione cattura automaticamente
    gli annunci dalle pagine di ricerca e dai dettagli.
    <br><br>
    Backend: <code>npm run extension:server</code>
  </div>

  <script src="popup.js"></script>
</body>
</html>
